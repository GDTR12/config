set -g allow-passthrough on
set -g mouse on
##### Basic #####

# 把默认 Prefix 从 Ctrl+b 改成 Ctrl+a，更接近 GNU screen / Vim 用户习惯
# Prefix 使用默认 Ctrl+b
set -g prefix C-b
bind C-b send-prefix

# 提高响应速度，尤其是 Esc / Vim 模式下
set -sg escape-time 10

# 从 1 开始编号，方便键盘切换窗口
set -g base-index 1
setw -g pane-base-index 1

# 新建窗口 / pane 默认在当前目录
bind c new-window -c "#{pane_current_path}"

# 历史行数
set -g history-limit 50000

# 支持 256 色
set -g default-terminal "screen-256color"

# Ubuntu 上如果支持 true color，可以保留；老终端有问题再注释
set -ga terminal-overrides ",xterm-256color:Tc"


##### Pane split #####

# Prefix + | ：左右分屏
bind | split-window -h -c "#{pane_current_path}"

# Prefix + - ：上下分屏
bind - split-window -v -c "#{pane_current_path}"

# 取消默认不直观的分屏按键
unbind '"'
unbind %


##### Pane navigation: Vim hjkl #####

# Prefix + h/j/k/l 切换 pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Prefix + o 在 pane 间轮换
bind o select-pane -t :.+

# Prefix + z 最大化/恢复当前 pane
bind z resize-pane -Z


##### Pane resize: Vim HJKL #####

# Prefix + H/J/K/L 调整 pane 大小
# -r 表示可以连续按，不用每次都重新按 Prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Prefix + = 平铺均分所有 pane
bind = select-layout tiled


##### Window navigation #####

# Prefix + n / p：下一个/上一个 window
bind n next-window
bind p previous-window

# Prefix + Tab：切回上一个 window
bind Tab last-window

# Prefix + r：重载配置
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


##### Copy mode: Vim style #####

# 使用 vi 复制模式
# copy mode: Vim style + system clipboard #####

setw -g mode-keys vi

bind [ copy-mode
bind ] paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# 默认：只复制到 tmux buffer
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Ubuntu X11: xclip
if-shell "command -v xclip >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

if-shell "command -v xclip >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Ubuntu Wayland: wl-copy，优先级高于 xclip
if-shell "command -v wl-copy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'"

if-shell "command -v wl-copy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'"

# macOS: pbcopy，优先级最高
if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'"

##### Quality of life #####

# Prefix + x 关闭当前 pane
bind x kill-pane

# Prefix + X 关闭当前 window
bind X kill-window

# Prefix + w 列出 window
bind w choose-window

# Prefix + q 显示 pane 编号
bind q display-panes

# 状态栏刷新快一点
set -g status-interval 2

